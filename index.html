<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>CityFibre Inventory</title><style>body{font-family:-apple-system,Arial;background:#eef2f5;margin:0}header{background:#003B5C;color:white;padding:20px;text-align:center}.container{padding:15px;max-width:700px;margin:auto}.card{background:white;padding:15px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin:12px 0}input{width:100%;padding:12px;margin:6px 0;border:1px solid #ccc;border-radius:10px;box-sizing:border-box}button{background:#00B5C8;color:white;border:none;padding:10px 14px;border-radius:10px;margin:4px}.low{color:red;font-weight:bold}</style></head><body><header><h1>CityFibre Inventory</h1></header><div class=container><div class=card><input id=itemName placeholder="Item name"><input id=itemQty type=number placeholder=Quantity><input id=itemMin type=number placeholder="Minimum stock"><button id=addBtn>Add Item</button><button id=exportBtn>Export Backup</button><input id=importFile type=file></div><div id=list></div></div><script>let items=JSON.parse(localStorage.getItem("cityfibreInventory")||"[]");function save(){localStorage.setItem("cityfibreInventory",JSON.stringify(items));render()}function render(){const list=document.getElementById("list");list.innerHTML="";items.forEach((it,i)=>{const d=document.createElement("div");d.className="card";d.innerHTML=`<h3>${it.name}</h3><p>Qty: ${it.qty} | Min: ${it.min} ${it.qty<=it.min?'<span class="low">LOW STOCK</span>':''}</p><button onclick="changeQty(${i},1)">+1</button><button onclick="changeQty(${i},-1)">-1</button><button onclick="removeItem(${i})">Delete</button>`;list.appendChild(d)})}window.changeQty=(i,d)=>{items[i].qty=Math.max(0,items[i].qty+d);save()};window.removeItem=(i)=>{items.splice(i,1);save()};document.getElementById("addBtn").addEventListener("click",()=>{const n=document.getElementById("itemName").value.trim();if(!n){alert("Enter item name");return;}items.push({name:n,qty:parseInt(document.getElementById("itemQty").value)||0,min:parseInt(document.getElementById("itemMin").value)||0});document.getElementById("itemName").value="";document.getElementById("itemQty").value="";document.getElementById("itemMin").value="";save()});document.getElementById("exportBtn").addEventListener("click",()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(items)],{type:"application/json"}));a.download="cityfibre-backup.json";a.click()});document.getElementById("importFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{items=JSON.parse(r.result);save()};r.readAsText(f)});render();</script></body></html>
