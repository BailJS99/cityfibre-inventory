<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityFibre Inventory V6</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="sidebar" class="sidebar">
  <div class="logo">⚪ CityFibre</div>
  <a href="#" onclick="showPage('dashboard')">Dashboard</a>
  <a href="#" onclick="showPage('stock')">Stock Count</a>
  <a href="#" onclick="showPage('orders')">Stock Orders</a>
  <a href="#" onclick="showPage('jobs')">Jobs</a>
  <a href="#" onclick="showPage('settings')">Settings</a>
</div>

<header class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="brand">⚪ CityFibre</div>
  <button class="add-btn">+</button>
</header>

<div class="container">
<section id="dashboard" class="page">
<div class="hero">
<div><h2>Welcome back!</h2><p>Here's what's happening with your inventory.</p></div>
</div>
<div class="stats">
<div class="card"><small>Total Items</small><h3 id="totalItems">0</h3></div>
<div class="card"><small>Low Stock</small><h3 id="lowStock">0</h3></div>
<div class="card"><small>Orders Needed</small><h3 id="ordersNeeded">0</h3></div>
<div class="card"><small>Jobs Logged</small><h3 id="jobsLogged">0</h3></div>
</div>
<div class="actions">
<button onclick="showPage('stock')">Add Stock Item</button>
<button onclick="showPage('jobs')">Create Job</button>
</div>
</section>

<section id="stock" class="page hidden">
<h2>Stock Count</h2>
<input id="itemName" placeholder="Item Name">
<input id="itemQty" type="number" placeholder="Current Stock">
<input id="itemThreshold" type="number" placeholder="Threshold">
<input id="itemTarget" type="number" placeholder="Target">
<button onclick="addItem()">Add New Item</button>
<div id="stockList"></div>
</section>

<section id="orders" class="page hidden"><h2>Stock Orders</h2><div id="orderList"></div></section>
<section id="jobs" class="page hidden"><h2>Jobs</h2><input id="jobRef" placeholder="Job Ref"><select id="jobItem"></select><input id="jobQty" type="number" placeholder="Qty Used"><button onclick="saveJob()">Save Job</button><div id="jobList"></div></section>
<section id="settings" class="page hidden"><h2>Settings</h2><div class="card">More customisation coming soon.</div></section>
</div>

<script src="app.js"></script>
</body></html>
